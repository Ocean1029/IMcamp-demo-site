<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 資管營 Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="logo">IMcamp 2026</div>
    <ul class="nav-links">
      <li><a href="#about">關於</a></li>
      <li><a href="#features">特色</a></li>
      <li><a href="#contact">聯絡</a></li>
    </ul>
  </nav>

  <header class="hero">
    <h1>歡迎來到資管營</h1>
    <p>這是一個用來測試 GitHub Pages 的 Demo 網站</p>
    <button id="dog-btn" class="btn">來一隻隨機狗狗 🐶</button>
    <div id="dog-container"></div>
  </header>

  <section id="about" class="section">
    <h2>關於這個網站</h2>
    <p>這是一個純 HTML/CSS/JS 的靜態網站，用來展示 GitHub Pages 部署流程。</p>
  </section>

  <section id="features" class="section alt">
    <h2>今天學到的技能</h2>
    <div class="cards">
      <div class="card">
        <h3>🚀 部署</h3>
        <p>把網站放到網路上讓全世界都看得到</p>
      </div>
      <div class="card">
        <h3>🐛 Debug</h3>
        <p>學會看錯誤訊息，不再怕紅字</p>
      </div>
      <div class="card">
        <h3>🔗 API</h3>
        <p>串接第三方服務，讓網站更有趣</p>
      </div>
    </div>
  </section>

  <footer id="contact" class="footer">
    <p>Made with ❤️ at NTU IMcamp 2026</p>
  </footer>

  <script src="script.js"></script>

</html>
